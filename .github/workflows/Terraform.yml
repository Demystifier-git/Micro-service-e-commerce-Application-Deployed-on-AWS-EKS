name: Terraform Production Deployment

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:


# TERRAFORM PLANN


  plan:

    name: Terraform Plan

    runs-on: ubuntu-latest


    environment:
      name: production

    defaults:
      run:
        working-directory: terraform

    env:
      TF_VAR_db_username: ${{ secrets.DB_USERNAME }}
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
      TF_VAR_db_name: ${{ secrets.DB_NAME }}
      TF_VAR_secret_values: ${{ secrets.SECRET_VALUES }}

    steps:

      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TERRAFORM_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      # Terraform
 

      - name: Terraform Format
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Validate
        run: terraform validate

      
      # TFLint
   

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Run TFLint
        run: |
          tflint --init
          tflint

     
      # tfsec
     

      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.3

      # Checkov
      

      - name: Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform

    
      # Trivy
    

      - name: Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: terraform

     
      # Terraform Plan
    

      - name: Terraform Plan
        run: terraform plan -input=false -var-file=production.tfvars -out=tfplan

     
      # Upload Plan
   

      - uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan


# APPLY


  apply:

    name: Terraform Apply

    needs: plan

    runs-on: ubuntu-latest

    environment:
      name: production

    defaults:
      run:
        working-directory: terraform

    env:
      TF_VAR_db_username: ${{ secrets.DB_USERNAME }}
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
      TF_VAR_db_name: ${{ secrets.DB_NAME }}
      TF_VAR_secret_values: ${{ secrets.SECRET_VALUES }}

    steps:

      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TERRAFORM_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -reconfigure

      - uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform

      
      # Terraform Apply
     

      - name: Terraform Apply

        id: terraform_apply

        continue-on-error: true

        run: |
          terraform apply -input=false tfplan 2>&1 | tee terraform.log

     
      # Upload Logs
      

      - name: Upload Terraform Logs

        if: always()

        uses: actions/upload-artifact@v4

        with:

          name: terraform-logs

          path: terraform/terraform.log

      
      # Python
      

      - name: Setup Python

        if: failure()

        uses: actions/setup-python@v5

        with:

          python-version: "3.12"

      
      # Install Gemini SDK
      

      - name: Install AI Dependencies

        if: failure()

        run: |

          python -m pip install --upgrade pip

          pip install -r ../requirements.txt

      
      # Run AI
      

      - name: AI DevOps Engineer

        if: failure()

        env:

          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

        run: |

          python ../.github/scripts/ai_devops_engineer.py

      
      # Publish Report
      

      - name: Publish AI Report

        if: failure()

        run: |

          cat ai_report.md >> $GITHUB_STEP_SUMMARY

      
      # Fail Job
     

      - name: Exit

        if: steps.terraform_apply.outcome == 'failure'

        run: exit 1

        