version: "3.8"

services:
  app:
    build:
      context: ./src
      dockerfile: Dockerfile
    container_name: credpal-app
    ports:
      - "3000:3000"
    env_file:
      - ./src/.env
    depends_on:
      - postgres
    networks:
      - app-network

  postgres:
    image: postgres:15-alpine
    container_name: credpal-postgres
    ports:
      - "5432:5432"
    env_file:
      - ./database/.env
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data: